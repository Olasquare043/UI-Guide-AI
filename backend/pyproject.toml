[tool.black]
line-length = 100
target-version = ['py311']

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ['E', 'F', 'I']

[tool.ruff.lint.isort]
known-first-party = ['agent', 'main', 'settings']

[tool.pytest.ini_options]
testpaths = ['tests']
asyncio_default_fixture_loop_scope = 'function'
